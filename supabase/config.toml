[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://postpilot.lovable.app"]
jwt_expiry = 3600

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "env(SUPABASE_URL)/auth/v1/callback"

# ── Edge Functions — JWT verification ────────────────────────────────────────
# Ces fonctions reçoivent des requêtes sans JWT utilisateur :
# - linkedin-oauth-callback : redirect navigateur depuis LinkedIn (pas de header Auth)
# - webhook-from-n8n        : appelé par n8n avec X-N8N-Api-Key, pas de JWT user
# - send-notification       : appelé par n8n avec X-N8N-Api-Key, pas de JWT user

[functions.linkedin-oauth-callback]
verify_jwt = false

[functions.webhook-from-n8n]
verify_jwt = false

[functions.send-notification]
verify_jwt = false
